apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: "4"
  labels:
    app: backend
  name: backend
  namespace: default
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - image: kuunyangna/school-app-backend:v5
        env: 
           - name: DB_NAME
             valueFrom:
              secretKeyRef:
                name: my-sec
                key: POSTGRES_DB
           - name: DB_PASSWORD
             valueFrom:
              secretKeyRef:
                name: my-sec
                key: POSTGRES_PASSWORD
           - name: DB_USER
             valueFrom:
              secretKeyRef:
                name: my-sec
                key: POSTGRES_USER
           - name: DB_HOST
             value: postgres
        imagePullPolicy: Always
        name: school-app-backend
        resources:
          limits:
            cpu: "2"
            memory: 1000Mi
          requests:
            cpu: 500m
            memory: 500Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 30
